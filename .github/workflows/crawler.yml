name: Daily Web Crawler

on:
  # 1. 파일 수정 후 깃허브에 올리면 '기다림 없이 즉시' 크롤링 실행!
  push:
    branches:
      - main
    paths-ignore:
      - 'latest_jobs.json' # 무한루프 방지
  # 2. 매일 지정된 시간에 자동 실행 (한국시간 오후 7시 40분 기준)
  schedule:
    - cron: '40 10 * * *'
  # 3. 수동 실행 버튼
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add latest_jobs.json
        git commit -m "🤖 자동 업데이트: 실시간 대외활동 JSON 갱신" || echo "No changes to commit"
        git push
